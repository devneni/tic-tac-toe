<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jogo da Velha</title>

    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="game.css">
</head>

<body>

<header class="top-bar">
    <button onclick="
    const game = document.getElementById('game');
    const difficulty = document.getElementById('difficulty');
    const menu = document.getElementById('menu');

    const gameVisible = window.getComputedStyle(game).display !== 'none';
    const difficultyVisible = window.getComputedStyle(difficulty).display !== 'none';

    if (gameVisible || difficultyVisible) {
        game.style.display = 'none';
        difficulty.style.display = 'none';
        menu.style.display = 'block';

        document.getElementById('twoPlayer').style.display = 'inline-block';
        document.getElementById('vsAI').style.display = 'inline-block';
    } else {
        window.location.href = '../../index.html';
    }
    " class="back-menu">
    ← Voltar
    </button>

    <h2 class="title">Jogo da Velha</h2>
</header>

<div id="menu" class="center">
    <h2>Escolha o modo:</h2>
    <button id="twoPlayer">2 Jogadores</button>
    <button id="vsAI">Vs IA</button>

    <div id="difficulty" style="display:none;">
        <h3>Dificuldade:</h3>
        <button class="diff" data-diff="easy">Fácil</button>
        <button class="diff" data-diff="medium">Médio</button>
        <button class="diff" data-diff="hard">Difícil</button>
        <button class="diff" data-diff="impossible">Impossível</button>
        <button id="back">← Voltar</button>
    </div>
</div>

<div id="game" style="display:none;" class="center">
    <div class="game-container">

        <!-- MENSAGEM ACIMA -->
        <div class="message" id="message">Vez do jogador X</div>

        <!-- TABULEIRO -->
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button class="reset-btn" id="reset">Reiniciar</button>
    </div>
</div>

<footer>
  Tic Tac Toe © 2026
</footer>

<script src="game.js"></script>

</body>
</html>
